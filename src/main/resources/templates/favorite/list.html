<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <body>
    <section th:fragment="content" class="favorite-page" data-favorite-page>
      <div class="favorite-shell">
        <header class="favorite-header">
          <div>
            <p class="favorite-kicker">Favorite</p>
            <h1>즐겨찾기</h1>
            <p class="favorite-count">
              총
              <strong data-favorite-total-count th:text="${productPage.totalCount}">0</strong>개의
              상품
            </p>
          </div>

          <form class="favorite-sort-form" th:action="@{/favorites}" method="get">
            <label class="visually-hidden" for="favorite-sort">정렬</label>
            <select id="favorite-sort" name="sort" onchange="this.form.submit()">
              <option value="latest" th:selected="${condition.sort == 'latest'}">
                최근 추가순
              </option>
              <option value="popular" th:selected="${condition.sort == 'popular'}">인기순</option>
              <option value="priceAsc" th:selected="${condition.sort == 'priceAsc'}">
                낮은 가격순
              </option>
              <option value="priceDesc" th:selected="${condition.sort == 'priceDesc'}">
                높은 가격순
              </option>
            </select>
          </form>
        </header>

        <p class="favorite-empty" data-favorite-empty th:hidden="${productPage.hasProducts()}">
          즐겨찾기한 상품이 없습니다.
        </p>

        <div class="favorite-grid" data-favorite-grid th:hidden="${!productPage.hasProducts()}">
          <article
            class="favorite-product-card"
            data-favorite-product-card
            th:each="product : ${productPage.products}"
          >
            <div class="favorite-product-card__image">
              <a
                class="favorite-product-card__image-link"
                th:href="@{/product/{id}(id=${product.productId})}"
              >
                <img
                  th:src="${#strings.isEmpty(product.pictureLocation) ? '/images/logo-hi-eating.png' : product.pictureLocation}"
                  th:alt="${product.productName}"
                  data-fallback-src="/images/logo-hi-eating.png"
                />
                <span
                  class="favorite-product-card__badge"
                  th:if="${product.discountRate > 0}"
                  th:text="|${product.discountRate}%|"
                  >20%</span
                >
              </a>
              <th:block
                th:replace="~{fragments/favorite-button :: button(${product.productId}, true)}"
              ></th:block>
            </div>

            <a
              class="favorite-product-card__name"
              th:href="@{/product/{id}(id=${product.productId})}"
              th:text="${product.productName}"
            >
              상품명
            </a>

            <div class="favorite-product-card__price">
              <span th:if="${product.discountRate > 0}" th:text="|${product.discountRate}%|"
                >20%</span
              >
              <strong
                th:text="${#numbers.formatInteger(product.salePrice != null ? product.salePrice : product.price, 0, 'COMMA')} + '원'"
              >
                9,900원
              </strong>
            </div>
            <del
              th:if="${product.discountRate > 0}"
              th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + '원'"
              >12,000원</del
            >
            <p class="favorite-product-card__meta">
              <span th:text="|조회 ${product.viewCount}|">조회 0</span>
              <span th:text="|구매 ${product.totalQuantity}|">구매 0</span>
            </p>
          </article>
        </div>

        <nav
          class="favorite-pagination"
          th:if="${productPage.totalPages > 1}"
          aria-label="즐겨찾기 페이지"
        >
          <a
            th:classappend="${!productPage.hasPrevious()} ? ' is-disabled'"
            th:href="@{/favorites(page=${productPage.page - 1}, sort=${condition.sort})}"
          >
            <i class="bi bi-chevron-left" aria-hidden="true"></i>
          </a>
          <a
            th:each="pageNumber : ${#numbers.sequence(1, productPage.totalPages)}"
            th:text="${pageNumber}"
            th:classappend="${pageNumber == productPage.page} ? ' is-active'"
            th:href="@{/favorites(page=${pageNumber}, sort=${condition.sort})}"
          >
            1
          </a>
          <a
            th:classappend="${!productPage.hasNext()} ? ' is-disabled'"
            th:href="@{/favorites(page=${productPage.page + 1}, sort=${condition.sort})}"
          >
            <i class="bi bi-chevron-right" aria-hidden="true"></i>
          </a>
        </nav>
      </div>
    </section>
  </body>
</html>
