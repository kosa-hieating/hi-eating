<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <body>
    <button
      th:fragment="button(productId, active)"
      aria-label="관심 상품 즐겨찾기"
      class="product-favorite-button position-absolute d-inline-flex align-items-center justify-content-center rounded-circle"
      th:classappend="${active} ? ' is-active'"
      th:attr="data-product-id=${productId}, aria-pressed=${active}"
      type="button"
    >
      <i aria-hidden="true" th:class="${active} ? 'bi bi-star-fill' : 'bi bi-star'"></i>
    </button>
  </body>
</html>
