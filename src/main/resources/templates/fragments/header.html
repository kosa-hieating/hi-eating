<!doctype html>

<html
  lang="ko"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  xmlns:th="http://www.thymeleaf.org"
>
  <body>
    <header class="site-header sticky-top bg-white" th:fragment="siteHeader">
      <div class="header-brand-row bg-white border-bottom">
        <div
          class="container-xxl brand-layout d-flex flex-wrap flex-lg-nowrap align-items-center gap-3 gap-lg-4 py-3 py-lg-0"
        >
          <a aria-label="Hi Eating 홈" class="brand-link flex-shrink-0 order-1" th:href="@{/}">
            <img alt="Hi Eating" class="brand-logo" th:src="@{/images/logo-hi-eating.png}" />
          </a>
          <form
            class="header-search input-group order-3 order-lg-2 w-100 mx-lg-auto"
            method="get"
            role="search"
            th:action="@{/search}"
          >
            <label class="visually-hidden" for="global-search">검색어</label>
            <input
              class="form-control"
              id="global-search"
              name="keyword"
              placeholder="건강을 쉽게, HI-Eating"
              th:value="${keyword}"
              type="search"
            />
            <button aria-label="검색" class="btn btn-hi-search" type="submit">
              <i aria-hidden="true" class="bi bi-search"></i>
            </button>
          </form>
          <nav
            aria-label="회원 메뉴"
            class="auth-links small order-2 order-lg-3 ms-auto d-flex align-items-center justify-content-end gap-2 gap-lg-3 text-nowrap"
          >
            <span class="auth-link-group" sec:authorize="isAnonymous()">
              <a th:href="@{/login}">로그인</a>
              <a th:href="@{/signup}">회원가입</a>
            </span>
            <span class="auth-link-group" sec:authorize="isAuthenticated()">
              <b><span sec:authentication="name"></span></b>
              <a th:href="@{/mypage}">마이페이지</a>
              <form th:action="@{/logout}" method="post" style="display: inline">
                <button
                  type="submit"
                  class="btn btn-link nav-link p-0 border-0 align-baseline"
                  style="font: inherit; color: inherit; cursor: pointer"
                >
                  로그아웃
                </button>
              </form>
              <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/hotdeals}">관리자 페이지</a>
            </span>
          </nav>
        </div>
      </div>

      <div class="header-nav-row bg-white border-bottom">
        <div
          class="container-xxl nav-layout d-flex align-items-center justify-content-between gap-2"
        >
          <div class="dropdown">
            <button
              aria-expanded="false"
              class="btn nav-category-trigger d-inline-flex align-items-center gap-2 px-2 px-sm-3"
              data-bs-display="static"
              data-bs-toggle="dropdown"
              type="button"
            >
              <span aria-hidden="true" class="category-icon-stack">
                <i class="bi bi-list category-icon category-icon-menu"></i>
                <i class="bi bi-x-lg category-icon category-icon-close"></i>
              </span>
              <span>카테고리</span>
            </button>
            <ul class="dropdown-menu category-menu">
              <li th:each="category : ${headerCategories}">
                <a
                  class="dropdown-item"
                  th:href="@{/categories/{categoryId}(categoryId=${category.id})}"
                  th:text="${category.name}"
                >
                  카테고리
                </a>
              </li>
            </ul>
          </div>

          <a
            class="nav-table-decor d-inline-flex align-items-center justify-content-center px-2 px-sm-3"
            th:href="@{/table-decorations}"
          >
            식탁 꾸미기
          </a>

          <a
            class="nav-hotdeal d-inline-flex align-items-center justify-content-center px-2 px-sm-3"
            th:href="@{/hot-deals}"
          >
            핫딜
          </a>

          <nav
            aria-label="개인 메뉴"
            class="d-inline-flex align-items-center justify-content-end gap-2"
          >
            <a
              aria-label="즐겨찾기"
              class="nav-icon-link d-inline-flex align-items-center justify-content-center"
              th:href="@{/favorites}"
            >
              <i aria-hidden="true" class="bi bi-star"></i>
            </a>
            <a
              aria-label="마이페이지"
              class="nav-icon-link d-inline-flex align-items-center justify-content-center"
              th:href="@{/mypage}"
            >
              <i aria-hidden="true" class="bi bi-person"></i>
            </a>
          </nav>
        </div>
      </div>
    </header>
  </body>
</html>
