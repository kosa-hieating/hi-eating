<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <body>
    <div th:fragment="content" class="admin-layout">
      <!-- 사이드바 -->
      <aside th:replace="~{admin/fragments/sidebar :: adminSidebar('hotdeals')}"></aside>

      <!-- 메인 콘텐츠 영역 -->
      <main class="main-container">
        <div class="header-panel">
          <div class="title-area">
            <h1>핫딜 관리</h1>
            <p>유통기한이 임박하거나 재고가 많은 상품을 핫딜로 등록하여 판매를 촉진하세요.</p>
          </div>
          <!-- 통계 배지 -->
          <div class="stat-badge">
            <div class="stat-badge-icon"><i class="bi bi-lightning-fill"></i></div>
            <div class="stat-badge-info">
              <h3 th:text="${hotDeals != null ? hotDeals.size() : 0}">2</h3>
              <p>진행중인 핫딜</p>
            </div>
          </div>
        </div>

        <!-- 대시보드 레이아웃 -->
        <div class="dashboard-grid">
          <!-- 왼쪽 영역 : 상품 검색 및 목록 -->
          <div>
            <div class="dashboard-card">
              <!-- 검색 필터 -->
              <div class="row g-3 mb-4">
                <div class="col-md-5">
                  <label class="control-label">상품 검색</label>
                  <div class="position-relative">
                    <input
                      type="text"
                      class="form-control form-control-custom w-100"
                      id="searchKeyword"
                      placeholder="상품명 또는 상품코드 입력"
                      onkeydown="if(event.key==='Enter') searchProducts(true)"
                    />
                    <i
                      class="bi bi-search position-absolute"
                      style="right: 12px; top: 10px; color: var(--text-muted); cursor: pointer"
                      onclick="searchProducts(true)"
                    ></i>
                  </div>
                </div>
                <div class="col-md-3">
                  <label class="control-label">카테고리</label>
                  <select
                    class="form-select form-control-custom"
                    id="searchCategory"
                    onchange="searchProducts(true)"
                  >
                    <option value="">전체</option>
                    <option
                      th:each="cat : ${categories}"
                      th:value="${cat.id}"
                      th:text="${cat.name}"
                    >
                      카테고리
                    </option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="control-label">정렬 기준</label>
                  <select
                    class="form-select form-control-custom"
                    id="searchSort"
                    onchange="searchProducts(true)"
                  >
                    <option value="EXPIRE_ASC">유통기한 임박순</option>
                    <option value="STOCK_ASC">재고 적은순</option>
                  </select>
                </div>
              </div>

              <!-- 정렬 버튼 및 새로고침 -->
              <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="filter-pills">
                  <button
                    class="btn-pill active"
                    id="btnSortExpire"
                    onclick="changeSort('EXPIRE_ASC')"
                  >
                    <i class="bi bi-clock"></i> 유통기한 임박순
                  </button>
                  <button class="btn-pill" id="btnSortStock" onclick="changeSort('STOCK_ASC')">
                    <i class="bi bi-box-seam"></i> 재고 적은순
                  </button>
                </div>
                <button class="btn-pill" onclick="resetSearch()">
                  <i class="bi bi-arrow-clockwise"></i> 새로고침
                </button>
              </div>

              <!-- 상품 목록 영역 -->
              <div class="card-title">상품 목록</div>
              <div class="total-count-lbl" id="totalCountDisplay">24개</div>

              <div class="product-row header">
                <div>상품</div>
                <div>카테고리</div>
                <div>정상가</div>
                <div>재고</div>
                <div>유통기한</div>
                <div>상태</div>
                <div class="text-center">선택</div>
              </div>

              <!-- 검색 결과 출력 영역  -->
              <div id="productSearchResult" style="min-height: 250px">
                <!-- AJAX 동적으로 상품 목록 출력 -->
              </div>

              <!-- 페이지네이션 -->
              <div class="pagination-custom" id="productPagination"></div>
            </div>

            <!-- 하단: 등록된 핫딜 목록 -->
            <div class="dashboard-card">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="card-title m-0">등록된 핫딜</div>

                <!-- 우측 정렬 필즈 + 전체 갯수 세트 -->
                <div class="d-flex align-items-center gap-3">
                  <select
                    class="form-select form-control-custom deal-status-filter"
                    id="dealStatusFilter"
                    aria-label="핫딜 상태 필터"
                    onchange="changeDealStatusFilter(this.value)"
                  >
                    <option value="ALL">전체 상태</option>
                    <option value="ACTIVE">진행중</option>
                    <option value="SCHEDULED">대기중</option>
                    <option value="ENDED">종료됨</option>
                  </select>
                  <!-- 시작일 정렬 필터 필즈 -->
                  <div class="filter-pills m-0">
                    <button
                      type="button"
                      class="btn-pill active"
                      id="btnDealSortAsc"
                      onclick="changeDealSort('ASC')"
                    >
                      <i class="bi bi-calendar-event"></i> 오래된순
                    </button>
                    <button
                      type="button"
                      class="btn-pill"
                      id="btnDealSortDesc"
                      onclick="changeDealSort('DESC')"
                    >
                      <i class="bi bi-calendar-event"></i> 최신순
                    </button>
                  </div>
                  <div class="total-count-lbl m-0" id="dealTotalCount">0개</div>
                </div>
              </div>
              <p
                style="
                  font-size: 0.82rem;
                  color: var(--text-muted);
                  margin-top: -0.5rem;
                  margin-bottom: 1.25rem;
                "
              >
                수정 버튼을 누르면 우측 패널에서 내용을 바로 편집합니다.
              </p>

              <div class="table-responsive">
                <table class="table-existing">
                  <thead>
                    <tr>
                      <th style="width: 25%">핫딜명</th>
                      <th style="width: 30%">기간</th>
                      <th style="width: 12%">상품 수</th>
                      <th style="width: 15%">할인율</th>
                      <th style="width: 10%">상태</th>
                      <th class="text-center" style="width: 8%">관리</th>
                    </tr>
                  </thead>
                  <tbody id="registeredDealsBody">
                    <!-- JS 동적 렌더링 -->
                  </tbody>
                </table>
              </div>

              <!-- 등록된 핫딜용 페이지네이션 -->
              <div
                class="pagination-custom justify-content-center mt-3"
                id="registeredDealsPagination"
              ></div>
            </div>
          </div>

          <!-- 오른쪽 영역 : 핫딜 등록 섹션 -->
          <aside>
            <div class="right-sidebar-card">
              <h2>핫딜 등록</h2>
              <p>선택한 상품으로 새 핫딜을 등록합니다.</p>

              <form id="hotDealForm" onsubmit="event.preventDefault();">
                <!-- 선택한 상품 목록 -->
                <div class="selected-summary-box" id="selectedProductsBox">
                  <div class="selected-header">
                    <span class="selected-lbl">
                      <i class="bi bi-box-seam text-primary"></i> 선택된 상품 (0개)
                    </span>
                  </div>
                  <div class="text-center py-3 text-muted" style="font-size: 0.8rem">
                    왼쪽 목록에서 핫딜에 지정할 상품을 선택해 주세요.
                  </div>
                </div>

                <div class="mb-3">
                  <label class="control-label" for="dealTitle">핫딜 이름</label>
                  <input
                    type="text"
                    class="form-control form-control-custom w-100"
                    id="dealTitle"
                    placeholder="여름맞이 특별 핫딜"
                    required
                  />
                </div>

                <div class="mb-3">
                  <div class="mb-1">
                    <label class="control-label m-0" for="dealDescription">핫딜 설명</label>
                  </div>
                  <textarea
                    class="form-control form-control-custom w-100"
                    id="dealDescription"
                    rows="3"
                    placeholder="고객에게 노출할 간단한 설명을 입력하세요."
                    maxlength="200"
                    oninput="updateCharCount()"
                  ></textarea>
                  <div class="text-end text-muted" style="font-size: 0.7rem; margin-top: 0.25rem">
                    <span id="charCount">0</span>/200
                  </div>
                </div>

                <div class="row g-2 mb-3">
                  <div class="col-6">
                    <label class="control-label">시작일</label>
                    <input
                      type="date"
                      class="form-control form-control-custom w-100"
                      id="startsAt"
                      required
                    />
                  </div>
                  <div class="col-6">
                    <label class="control-label">종료일</label>
                    <input
                      type="date"
                      class="form-control form-control-custom w-100"
                      id="endsAt"
                      required
                    />
                  </div>
                </div>

                <div class="mb-4">
                  <label class="control-label" for="discountRate">핫딜 할인율</label>
                  <div class="d-flex gap-2">
                    <div class="position-relative flex-grow-1">
                      <input
                        type="number"
                        class="form-control form-control-custom w-100 pe-4"
                        id="discountRate"
                        placeholder="30"
                        min="1"
                        max="99"
                        required
                      />
                      <span
                        class="position-absolute"
                        style="
                          right: 12px;
                          top: 8px;
                          font-size: 0.85rem;
                          color: var(--text-muted);
                          font-weight: 600;
                        "
                        >%</span
                      >
                    </div>
                    <button
                      type="button"
                      onclick="applyRecommendedDiscount()"
                      class="btn btn-outline-custom"
                      style="
                        font-weight: 700;
                        border-radius: 8px;
                        font-size: 0.85rem;
                        padding: 0 1rem;
                        color: var(--orange-brand);
                        border-color: #ffc9c9;
                        background: #fff8f5;
                      "
                    >
                      추천 할인율
                    </button>
                  </div>
                </div>

                <div class="d-flex gap-2 mb-2">
                  <button
                    type="button"
                    onclick="resetHotDealForm()"
                    class="action-btn btn-outline-custom"
                    style="width: 40%"
                  >
                    취소
                  </button>
                  <button type="submit" class="action-btn btn-orange" style="width: 60%">
                    핫딜 등록
                  </button>
                </div>

                <button
                  type="button"
                  id="btnEndHotDeal"
                  class="action-btn btn-close-hotdeal mt-2"
                  style="display: none"
                >
                  선택 상품으로 핫딜 종료
                </button>
              </form>
            </div>
          </aside>
        </div>
      </main>

      <script th:inline="javascript">
        /*<![CDATA[*/
        document.addEventListener('DOMContentLoaded', () => {
          const rawDeals = /*[[${hotDeals}]]*/ [];
          if (typeof initRegisteredDeals === 'function') {
            initRegisteredDeals(rawDeals);
          }
        });
        /*]]>*/
      </script>
    </div>
  </body>
</html>
