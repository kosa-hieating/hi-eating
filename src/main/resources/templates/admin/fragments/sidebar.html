<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <!--
  어드민 전용 레이아웃 사이드바 프래그먼트
  - 파라미터 activeMenu: 현재 활성화된 메뉴를 강조 표시합니다 ('hotdeals', 'statistics', 'promotions', 'users')
-->
  <aside class="sidebar" th:fragment="adminSidebar(activeMenu)">
    <div>
      <!-- 브랜드 로고 및 셀렉터 -->
      <div class="brand-section">
        <a th:href="@{/}" class="logo-container text-decoration-none" aria-label="홈으로 이동">
          <img th:src="@{/images/logo-hi-eating.png}" class="logo-img" alt="logo" />
          <span class="logo-text">HI.eating</span>
        </a>
      </div>

      <!-- 메뉴 리스트 -->
      <ul class="nav flex-column gap-2" style="list-style: none; padding: 0">
        <!-- 1. 타임 핫딜 지정 -->
        <li class="nav-item">
          <a
            class="nav-link py-2 px-3 text-dark d-flex align-items-center gap-3"
            href="/admin/hotdeals"
            th:style="${activeMenu == 'hotdeals'} ? 'background: linear-gradient(90deg, #ff6b6b 0%, #ff8e53 100%); color: #ffffff !important; font-weight: 700; border-radius: 8px; box-shadow: 0 4px 10px rgba(255, 107, 107, 0.2);' : 'font-weight: 600; border-radius: 8px;'"
          >
            <i
              class="bi bi-lightning-fill"
              th:style="${activeMenu == 'hotdeals'} ? 'color: #ffffff !important;' : 'color: var(--text-muted);'"
            ></i>
            타임 핫딜 지정
          </a>
        </li>

        <!-- 2. 통계 자료 -->
        <li class="nav-item">
          <a
            class="nav-link py-2 px-3 text-dark d-flex align-items-center gap-3"
            href="/admin/statistics"
            th:style="${activeMenu == 'statistics'} ? 'background: linear-gradient(90deg, #ff6b6b 0%, #ff8e53 100%); color: #ffffff !important; font-weight: 700; border-radius: 8px; box-shadow: 0 4px 10px rgba(255, 107, 107, 0.2);' : 'font-weight: 600; border-radius: 8px;'"
          >
            <i
              class="bi bi-bar-chart-line-fill"
              th:style="${activeMenu == 'statistics'} ? 'color: #ffffff !important;' : 'color: var(--text-muted);'"
            ></i>
            통계 자료
          </a>
        </li>

        <!-- 3. 프로모션 설정 -->
        <li class="nav-item">
          <a
            class="nav-link py-2 px-3 text-dark d-flex align-items-center gap-3"
            href="/admin/promotions"
            th:style="${activeMenu == 'promotions'} ? 'background: linear-gradient(90deg, #ff6b6b 0%, #ff8e53 100%); color: #ffffff !important; font-weight: 700; border-radius: 8px; box-shadow: 0 4px 10px rgba(255, 107, 107, 0.2);' : 'font-weight: 600; border-radius: 8px;'"
          >
            <i
              class="bi bi-images"
              th:style="${activeMenu == 'promotions'} ? 'color: #ffffff !important;' : 'color: var(--text-muted);'"
            ></i>
            프로모션 설정
          </a>
        </li>

        <!-- 4. 관리자 계정 -->
        <li class="nav-item">
          <a
            class="nav-link py-2 px-3 text-dark d-flex align-items-center gap-3"
            href="/admin/users"
            th:style="${activeMenu == 'users'} ? 'background: linear-gradient(90deg, #ff6b6b 0%, #ff8e53 100%); color: #ffffff !important; font-weight: 700; border-radius: 8px; box-shadow: 0 4px 10px rgba(255, 107, 107, 0.2);' : 'font-weight: 600; border-radius: 8px;'"
          >
            <i
              class="bi bi-person-gear"
              th:style="${activeMenu == 'users'} ? 'color: #ffffff !important;' : 'color: var(--text-muted);'"
            ></i>
            관리자 계정
          </a>
        </li>
      </ul>
    </div>

    <!-- 프로필 섹션 (하단 고정) -->
    <a
      class="user-profile"
      th:if="${currentUser != null}"
      th:href="@{/mypage/edit}"
      aria-label="회원정보 수정"
    >
      <div class="user-info">
        <div
          class="user-avatar bg-light d-flex align-items-center justify-content-center text-secondary"
          style="border: 1px solid #e0e0e0"
        >
          <i class="bi bi-person-fill" style="font-size: 1.25rem"></i>
        </div>
        <div class="user-details">
          <span class="user-name" th:text="${currentUser.name}">Eddy</span>
          <span class="user-email" th:text="${currentUser.email}">eddy@alphaca.kr</span>
        </div>
      </div>
    </a>
  </aside>
</html>
