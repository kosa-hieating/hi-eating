<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="review-shell py-4 py-md-5" th:fragment="content">
  <div class="review-container container px-3 px-sm-4">
    <header class="review-title-bar border rounded-2 px-3 py-3 mb-5">
      <h1 class="mb-0">후기 작성</h1>
    </header>

    <form class="review-form d-flex flex-column gap-4" action="#" method="post" enctype="multipart/form-data">
      <input type="hidden" name="purchaseId" th:value="${reviewForm.purchaseId}">
      <input type="hidden" name="productId" th:value="${reviewForm.productId}">
      <input type="hidden" name="rating" id="reviewRating" th:value="${reviewForm.review.rating}">

      <section class="review-product-section" aria-labelledby="review-product-title">
        <h2 class="review-section-title mb-0" id="review-product-title">이 상품 어떠셨나요?</h2>
        <div class="review-product d-flex align-items-center gap-3 mx-auto mt-4">
          <img class="review-product-image rounded-2" th:src="${reviewForm.productImageUrl}" th:alt="${reviewForm.productName}">
          <div>
            <strong class="d-block mb-1" th:text="${reviewForm.brandName}">오도어</strong>
            <p class="mb-1" th:text="${reviewForm.productName}">Molly wide jogger in basic</p>
            <span class="text-muted" th:text="${reviewForm.optionName}">1 · BLACK</span>
          </div>
        </div>
      </section>

      <section class="review-rating-section border-bottom text-center pb-4" aria-labelledby="review-rating-title">
        <h2 class="review-section-title mb-0" id="review-rating-title">이 상품 어떠셨나요?</h2>
        <p class="text-muted fw-bold mt-2 mb-3">별점을 입력해주세요 (필수)</p>
        <div class="review-stars d-flex justify-content-center gap-2" role="radiogroup" aria-label="상품 별점">
          <button class="review-star" type="button" data-rating="1" role="radio" aria-checked="false" aria-label="1점">
            <i class="bi bi-star-fill" aria-hidden="true"></i>
          </button>
          <button class="review-star" type="button" data-rating="2" role="radio" aria-checked="false" aria-label="2점">
            <i class="bi bi-star-fill" aria-hidden="true"></i>
          </button>
          <button class="review-star" type="button" data-rating="3" role="radio" aria-checked="false" aria-label="3점">
            <i class="bi bi-star-fill" aria-hidden="true"></i>
          </button>
          <button class="review-star" type="button" data-rating="4" role="radio" aria-checked="false" aria-label="4점">
            <i class="bi bi-star-fill" aria-hidden="true"></i>
          </button>
          <button class="review-star" type="button" data-rating="5" role="radio" aria-checked="false" aria-label="5점">
            <i class="bi bi-star-fill" aria-hidden="true"></i>
          </button>
        </div>
      </section>

      <section class="review-content-section" aria-labelledby="review-content-title">
        <label class="form-label fw-bold mb-3" for="reviewContent" id="review-content-title">어떤 점이 좋았나요? (필수)</label>
        <div class="review-textarea-wrap border rounded-2 bg-white">
          <textarea
              class="form-control border-0 shadow-none"
              id="reviewContent"
              name="content"
              maxlength="500"
              rows="7"
              placeholder="건전하고 유익한 후기를 위해, 검수 기준에 부합하지 않는 내용은 적립금 지급이 제한될 수 있습니다."
              th:text="${reviewForm.review.content}"></textarea>
        </div>
        <div class="review-count text-end text-muted mt-2"><span id="reviewContentCount">0</span>/500</div>
      </section>

      <section class="review-image-section pt-1" aria-labelledby="review-image-title">
        <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
          <h2 class="review-section-title mb-0" id="review-image-title">사진 첨부</h2>
          <span class="text-muted fw-bold">최대 1장</span>
        </div>
        <div class="d-flex align-items-center gap-3">
          <label class="review-image-upload d-inline-flex flex-column align-items-center justify-content-center border rounded-2" for="reviewImage">
            <i class="bi bi-camera" aria-hidden="true"></i>
            <span>사진 추가</span>
          </label>
          <input id="reviewImage" name="reviewImage" type="file" accept="image/*">
          <div class="review-image-preview" id="reviewImagePreview" hidden>
            <img src="" alt="첨부한 후기 사진 미리보기">
            <button class="d-inline-flex align-items-center justify-content-center" type="button" id="reviewImageRemove" aria-label="첨부 사진 삭제">
              <i class="bi bi-x-lg" aria-hidden="true"></i>
            </button>
          </div>
        </div>
      </section>

      <div class="d-flex justify-content-center pt-2">
        <button class="review-submit-button btn" type="button">리뷰 등록하기</button>
      </div>
    </form>
  </div>
</section>
</body>
</html>
