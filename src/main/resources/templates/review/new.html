<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <body>
    <section class="review-shell py-4 py-md-5" th:fragment="content">
      <div class="review-container container px-3 px-sm-4">
        <header class="review-title-bar border rounded-2 px-3 py-3 mb-5">
          <h1 class="mb-0">후기 작성</h1>
        </header>

        <form
          class="review-form d-flex flex-column gap-4"
          enctype="multipart/form-data"
          id="reviewForm"
          method="post"
          th:action="@{/api/reviews}"
        >
          <input name="purchaseId" th:value="${reviewForm.purchaseId}" type="hidden" />
          <input name="productId" th:value="${reviewForm.productId}" type="hidden" />
          <input
            id="reviewRating"
            name="rating"
            th:value="${reviewForm.review.rating}"
            type="hidden"
          />

          <section aria-labelledby="review-product-title" class="review-product-section">
            <h2 class="review-section-title mb-0" id="review-product-title">이 상품 어떠셨나요?</h2>
            <div class="review-product d-flex align-items-center gap-3 mx-auto mt-4">
              <img
                class="review-product-image rounded-2"
                th:alt="${reviewForm.productName}"
                th:src="${reviewForm.productImageUrl}"
              />
              <div>
                <strong class="d-block mb-1" th:text="${reviewForm.brandName}">오도어</strong>
                <p class="mb-1" th:text="${reviewForm.productName}">Molly wide jogger in basic</p>
                <span class="text-muted" th:text="${reviewForm.optionName}">1 · BLACK</span>
              </div>
            </div>
          </section>

          <section
            aria-labelledby="review-rating-title"
            class="review-rating-section border-bottom text-center pb-4"
          >
            <p class="text-muted fw-bold mt-2 mb-3">별점을 입력해주세요 (필수)</p>
            <div
              aria-label="상품 별점"
              class="review-stars d-flex justify-content-center gap-2"
              role="radiogroup"
            >
              <button
                aria-checked="false"
                aria-label="1점"
                class="review-star"
                data-rating="1"
                role="radio"
                type="button"
              >
                <i aria-hidden="true" class="bi bi-star-fill"></i>
              </button>
              <button
                aria-checked="false"
                aria-label="2점"
                class="review-star"
                data-rating="2"
                role="radio"
                type="button"
              >
                <i aria-hidden="true" class="bi bi-star-fill"></i>
              </button>
              <button
                aria-checked="false"
                aria-label="3점"
                class="review-star"
                data-rating="3"
                role="radio"
                type="button"
              >
                <i aria-hidden="true" class="bi bi-star-fill"></i>
              </button>
              <button
                aria-checked="false"
                aria-label="4점"
                class="review-star"
                data-rating="4"
                role="radio"
                type="button"
              >
                <i aria-hidden="true" class="bi bi-star-fill"></i>
              </button>
              <button
                aria-checked="false"
                aria-label="5점"
                class="review-star"
                data-rating="5"
                role="radio"
                type="button"
              >
                <i aria-hidden="true" class="bi bi-star-fill"></i>
              </button>
            </div>
          </section>

          <section aria-labelledby="review-content-title" class="review-content-section">
            <label class="form-label fw-bold mb-3" for="reviewContent" id="review-content-title"
              >어떤 점이 좋았나요? (필수)</label
            >
            <div class="review-textarea-wrap border rounded-2 bg-white">
              <textarea
                class="form-control border-0 shadow-none"
                id="reviewContent"
                maxlength="500"
                name="content"
                placeholder="건전하고 유익한 후기를 위해, 검수 기준에 부합하지 않는 내용은 적립금 지급이 제한될 수 있습니다."
                rows="7"
                th:text="${reviewForm.review.content}"
              ></textarea>
            </div>
            <div class="review-count text-end text-muted mt-2">
              <span id="reviewContentCount">0</span>/500
            </div>
          </section>

          <section aria-labelledby="review-image-title" class="review-image-section pt-1">
            <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
              <h2 class="review-section-title mb-0" id="review-image-title">사진 첨부</h2>
              <span class="text-muted fw-bold">최대 1장</span>
            </div>
            <div class="d-flex align-items-center gap-3">
              <label
                class="review-image-upload d-inline-flex flex-column align-items-center justify-content-center border rounded-2"
                for="reviewImage"
              >
                <i aria-hidden="true" class="bi bi-camera"></i>
                <span>사진 추가</span>
              </label>
              <input accept="image/*" id="reviewImage" name="reviewImage" type="file" />
              <div class="review-image-preview" hidden id="reviewImagePreview">
                <img alt="첨부한 후기 사진 미리보기" />
                <button
                  aria-label="첨부 사진 삭제"
                  class="d-inline-flex align-items-center justify-content-center"
                  id="reviewImageRemove"
                  type="button"
                >
                  <i aria-hidden="true" class="bi bi-x-lg"></i>
                </button>
              </div>
            </div>
          </section>

          <p class="review-submit-message mb-0 text-center" hidden id="reviewSubmitMessage"></p>

          <div class="d-flex justify-content-center pt-2">
            <button class="review-submit-button btn" type="submit">리뷰 등록하기</button>
          </div>
        </form>
      </div>
    </section>
  </body>
</html>
