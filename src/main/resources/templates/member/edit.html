<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <body>
    <section class="member-edit-page" th:fragment="content">
      <div class="member-edit-container">
        <form class="member-edit-form" th:action="@{/mypage/edit}" method="post">
          <div class="member-edit-panel">
            <h1 class="member-edit-title">회원 정보 수정 (필수)</h1>

            <div class="member-edit-fields">
              <div class="member-edit-row">
                <span class="member-edit-label">이름</span>
                <p class="member-edit-static" th:text="${member.name}">이재우</p>
              </div>

              <div class="member-edit-row">
                <label class="member-edit-label" for="member-email-local">이메일</label>
                <div class="member-edit-email">
                  <input
                    class="member-edit-input member-edit-email-local"
                    id="member-email-local"
                    name="emailLocal"
                    type="text"
                    autocomplete="email"
                    th:value="${emailLocal}"
                  />
                  <span class="member-edit-at">@</span>
                  <input
                    class="member-edit-input member-edit-email-domain-input"
                    id="member-email-domain"
                    name="emailDomain"
                    type="text"
                    th:value="${emailDomain}"
                  />
                  <select
                    class="member-edit-input member-edit-domain-select"
                    id="member-email-domain-select"
                    name="emailDomainSelect"
                    aria-label="이메일 도메인 선택"
                  >
                    <option value="">직접입력</option>
                    <option
                      th:each="domain : ${emailDomainOptions}"
                      th:value="${domain}"
                      th:text="${domain}"
                      th:selected="${domain == emailDomain}"
                    >
                      gmail.com
                    </option>
                  </select>
                  <button class="member-edit-outline-button" type="button">중복확인</button>
                </div>
              </div>

              <div class="member-edit-row">
                <span class="member-edit-label">생년월일</span>
                <p class="member-edit-static" th:text="${birthText}">1999년04월27일</p>
              </div>

              <fieldset class="member-edit-row member-edit-gender-row">
                <legend class="member-edit-label">성별</legend>
                <div class="member-edit-radio-group">
                  <label class="member-edit-radio">
                    <input
                      type="radio"
                      name="gender"
                      value="MALE"
                      th:checked="${member.gender == 'MALE'}"
                    />
                    <span aria-hidden="true"></span>
                    남성
                  </label>
                  <label class="member-edit-radio">
                    <input
                      type="radio"
                      name="gender"
                      value="FEMALE"
                      th:checked="${member.gender == 'FEMALE'}"
                    />
                    <span aria-hidden="true"></span>
                    여성
                  </label>
                </div>
              </fieldset>
            </div>

            <p class="member-edit-help">
              * 이름을 개명한 경우 고객센터로 문의해 주세요. (고객센터 : 1800-0700)
            </p>
          </div>

          <div class="member-edit-actions">
            <button class="member-edit-primary-button" type="submit">수정 완료</button>
            <button class="member-edit-danger-button" type="button">회원 탈퇴</button>
          </div>
        </form>
      </div>
    </section>
  </body>
</html>
