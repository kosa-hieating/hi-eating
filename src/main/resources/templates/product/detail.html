<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <body>
    <section class="product-detail-shell py-4 py-lg-5" th:fragment="content">
      <div class="container-xl product-detail-container">
        <section class="product-hero row g-4 g-xl-5 align-items-start">
          <div class="col-lg-6">
            <div class="product-gallery">
              <div class="product-main-image overflow-hidden bg-white position-relative">
                <img
                  id="mainProductImage"
                  th:alt="${product.name}"
                  th:src="${product.mainImageUrl()}"
                />
                <button class="carousel-control-prev" onclick="showPrevImage()" type="button">
                  <span aria-hidden="true" class="carousel-control-prev-icon"></span>
                  <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" onclick="showNextImage()" type="button">
                  <span aria-hidden="true" class="carousel-control-next-icon"></span>
                  <span class="visually-hidden">Next</span>
                </button>
              </div>

              <div class="product-thumbnails d-grid mt-3">
                <button
                  class="product-thumbnail"
                  th:classappend="${stat.index == 0} ? 'active'"
                  th:data-image-url="${imageUrl}"
                  th:each="imageUrl, stat : ${product.thumbnailImageUrls()}"
                  type="button"
                >
                  <img th:alt="|${product.name} ${stat.count}|" th:src="${imageUrl}" />
                </button>
              </div>
            </div>
          </div>

          <div class="col-lg-6">
            <article class="product-purchase-panel">
              <h1 class="mb-3" th:text="${product.name}"></h1>
              <div class="d-flex align-items-baseline flex-wrap gap-3 mb-4">
                <del
                  class="product-price-original"
                  th:if="${product.hasHotDeal()}"
                  th:text="${product.formattedPrice()}"
                ></del>
                <strong
                  class="product-price"
                  th:classappend="${product.hasHotDeal()} ? ' product-price-hotdeal'"
                  th:text="${product.formattedSalePrice()}"
                ></strong>
              </div>

              <div
                class="purchase-message purchase-message-success mb-3"
                th:if="${purchaseSuccessMessage != null}"
                th:text="${purchaseSuccessMessage}"
              ></div>
              <div
                class="purchase-message purchase-message-error mb-3"
                th:if="${purchaseErrorMessage != null}"
                th:text="${purchaseErrorMessage}"
              ></div>

              <form
                class="purchase-controls d-flex flex-column flex-sm-row align-items-stretch align-items-sm-center gap-3"
                method="post"
                th:action="@{/product/{productId}/purchase(productId=${product.id})}"
              >
                <div class="quantity-control d-inline-flex align-items-center">
                  <button class="quantity-button" data-quantity-action="decrease" type="button">
                    <i aria-hidden="true" class="bi bi-dash"></i>
                  </button>
                  <input
                    class="quantity-input"
                    id="productQuantity"
                    max="1"
                    min="1"
                    name="quantity"
                    required
                    th:max="${product.totalStock()}"
                    type="number"
                    value="1"
                  />
                  <button class="quantity-button" data-quantity-action="increase" type="button">
                    <i aria-hidden="true" class="bi bi-plus"></i>
                  </button>
                </div>
                <button
                  class="buy-button btn"
                  th:disabled="${product.totalStock() <= 0 || product.status != 'ON_SALE'}"
                  type="submit"
                >
                  구매하기
                </button>
                <th:block
                  th:replace="~{fragments/favorite-button :: button(${product.id}, ${product.favorite})}"
                ></th:block>
              </form>
            </article>
          </div>
        </section>

        <section class="product-content mt-5">
          <ul class="product-tabs nav" role="tablist">
            <li class="nav-item" role="presentation">
              <button
                aria-controls="product-description"
                aria-selected="true"
                class="nav-link active"
                data-bs-target="#product-description"
                data-bs-toggle="tab"
                id="product-description-tab"
                role="tab"
                type="button"
              >
                상품 상세 내역
              </button>
            </li>
            <li class="nav-item" role="presentation">
              <button
                aria-controls="product-reviews"
                aria-selected="false"
                class="nav-link"
                data-bs-target="#product-reviews"
                data-bs-toggle="tab"
                id="product-reviews-tab"
                role="tab"
                type="button"
              >
                리뷰
              </button>
            </li>
          </ul>

          <div class="tab-content product-tab-content bg-white">
            <section
              aria-labelledby="product-description-tab"
              class="tab-pane fade show active product-description-html"
              id="product-description"
              role="tabpanel"
              tabindex="0"
              th:utext="${product.safeDescriptionHtml()}"
            ></section>

            <section
              aria-labelledby="product-reviews-tab"
              class="tab-pane fade review-list"
              id="product-reviews"
              role="tabpanel"
              tabindex="0"
              th:data-review-api-url="@{/api/products/{productId}/reviews(productId=${product.id})}"
            >
              <div
                class="review-tab-header d-flex align-items-center justify-content-between gap-3"
              >
                <h2 class="mb-0">
                  리뷰
                  <span
                    id="reviewCount"
                    th:text="${product.reviewSummary.formattedReviewCount()}"
                  ></span>
                </h2>
                <a
                  class="review-write-link d-inline-flex align-items-center gap-2"
                  th:href="@{/review/new(productId=${product.id})}"
                >
                  <i aria-hidden="true" class="bi bi-plus-circle-fill"></i>
                  리뷰 작성하기
                  <i aria-hidden="true" class="bi bi-chevron-right"></i>
                </a>
              </div>
              <div class="review-loading" id="reviewLoading">리뷰를 불러오는 중입니다.</div>
              <div id="reviewList"></div>
              <p class="review-empty mb-0 d-none" id="reviewEmpty">아직 작성된 리뷰가 없습니다.</p>
              <p class="review-error mb-0 d-none" id="reviewError">리뷰를 불러오지 못했습니다.</p>
              <nav
                aria-label="리뷰 페이지"
                class="review-pagination d-none"
                id="reviewPagination"
              ></nav>
            </section>
          </div>
        </section>
      </div>
    </section>
  </body>
</html>
