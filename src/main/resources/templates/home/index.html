<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <body>
    <div class="home-page" th:fragment="content">
      <section aria-label="프로모션" class="promotion-section">
        <div
          class="promotion-carousel"
          data-carousel
          data-carousel-autoplay="true"
          data-carousel-visible="1"
          th:if="${!#lists.isEmpty(promotions)}"
        >
          <div class="promotion-viewport" data-carousel-viewport>
            <div class="promotion-track" data-carousel-track>
              <a
                class="promotion-slide"
                th:each="promotion : ${promotions}"
                th:href="${promotion.link != null ? promotion.link : '#'}"
              >
                <img
                  th:alt="${promotion.title}"
                  th:src="${#strings.isEmpty(promotion.imgSrc) ? '/images/logo-hi-eating.png' : promotion.imgSrc}"
                />
              </a>
            </div>
          </div>

          <div class="promotion-controls">
            <span class="promotion-count">
              <span data-carousel-current>1</span>/<span th:text="${#lists.size(promotions)}"
                >1</span
              >
            </span>
            <button
              aria-label="프로모션 자동 슬라이드 일시정지"
              class="promotion-pause"
              data-carousel-toggle
              type="button"
            >
              <i aria-hidden="true" class="bi bi-pause-fill"></i>
            </button>
          </div>

          <button
            aria-label="이전 프로모션"
            class="promotion-nav promotion-nav--prev"
            data-carousel-prev
            type="button"
          >
            <i aria-hidden="true" class="bi bi-chevron-left"></i>
          </button>
          <button
            aria-label="다음 프로모션"
            class="promotion-nav promotion-nav--next"
            data-carousel-next
            type="button"
          >
            <i aria-hidden="true" class="bi bi-chevron-right"></i>
          </button>
        </div>

        <p class="section-empty" th:if="${#lists.isEmpty(promotions)}">
          노출 중인 프로모션이 없습니다.
        </p>
      </section>

      <section
        aria-label="인기 식탁 꾸미기"
        class="popular-table-section container-xl reveal-section"
      >
        <div class="section-heading-row">
          <h2 class="section-title">인기 <strong>식탁 꾸미기</strong></h2>
          <a class="section-more-link" th:href="@{/table-decorations}">
            모두 보기
            <i class="bi bi-chevron-right" aria-hidden="true"></i>
          </a>
        </div>

        <p class="section-empty" th:if="${#lists.isEmpty(popularTableDecorPosts)}">
          아직 등록된 식탁이 없습니다.
        </p>

        <div class="popular-table-grid" th:if="${!#lists.isEmpty(popularTableDecorPosts)}">
          <a
            class="popular-table-card"
            th:each="post, stat : ${popularTableDecorPosts}"
            href="#home-table-decor-preview"
            data-home-table-decor-trigger
            th:attr="data-image-src=${#strings.isEmpty(post.imageSrc) ? '/images/logo-hi-eating.png' : post.imageSrc},
              data-image-alt=|${post.userName}님의 식탁|,
              data-owner=|${post.userName}님의 식탁|,
              data-created-at=${#temporals.format(post.createdAt, 'yyyy.MM.dd')},
              data-like-count=${post.likeCount}"
          >
            <span class="popular-table-card__rank" th:text="|Top ${stat.index + 1}|">Top 1</span>
            <img
              data-fallback-src="/images/logo-hi-eating.png"
              th:alt="|${post.userName}님의 식탁|"
              th:src="${#strings.isEmpty(post.imageSrc) ? '/images/logo-hi-eating.png' : post.imageSrc}"
            />
            <span class="popular-table-card__info">
              <strong th:text="|${post.userName}님의 식탁|">이용자님의 식탁</strong>
              <span>
                <i class="bi bi-heart-fill" aria-hidden="true"></i>
                <span th:text="${post.likeCount}">0</span>
              </span>
            </span>
          </a>
        </div>

        <div
          id="home-table-decor-preview"
          class="table-decor-modal"
          data-home-table-decor-modal
          role="dialog"
          aria-modal="true"
          aria-labelledby="home-table-decor-modal-title"
          aria-hidden="true"
          hidden
        >
          <button
            class="table-decor-modal__backdrop"
            type="button"
            data-home-table-decor-modal-close
            aria-label="식탁 미리보기 닫기"
          ></button>
          <div class="table-decor-modal__panel">
            <button
              class="table-decor-modal__close"
              type="button"
              data-home-table-decor-modal-close
              aria-label="식탁 미리보기 닫기"
            >
              <i class="bi bi-x-lg" aria-hidden="true"></i>
            </button>
            <div class="table-decor-modal__image">
              <img
                data-home-table-decor-modal-image
                src="/images/logo-hi-eating.png"
                alt="식탁 미리보기"
                data-fallback-src="/images/logo-hi-eating.png"
              />
            </div>
            <div class="table-decor-modal__body">
              <h2 id="home-table-decor-modal-title" data-home-table-decor-modal-owner>
                이용자님의 식탁
              </h2>
              <p>
                <span data-home-table-decor-modal-date>2026.07.04</span>
              </p>
              <span class="table-decor-modal__like">
                <i class="bi bi-heart-fill" aria-hidden="true"></i>
                <span data-home-table-decor-modal-like>0</span>
              </span>
            </div>
          </div>
        </div>
      </section>

      <section aria-label="원데이 핫딜" class="hot-deal-section container-xl reveal-section">
        <h2 class="section-title">원데이 <strong>핫딜</strong></h2>

        <p class="section-empty" th:if="${#lists.isEmpty(hotDealProducts)}">
          진행 중인 핫딜 상품이 없습니다.
        </p>

        <section
          class="hot-deal-carousel"
          data-carousel
          data-carousel-autoplay="true"
          data-carousel-visible="2"
          th:if="${!#lists.isEmpty(hotDealProducts)}"
        >
          <button
            aria-label="이전 핫딜"
            class="hot-deal-nav hot-deal-nav--prev"
            data-carousel-prev
            type="button"
          >
            <i aria-hidden="true" class="bi bi-chevron-left"></i>
          </button>

          <div class="hot-deal-viewport" data-carousel-viewport>
            <div class="hot-deal-track" data-carousel-track>
              <article class="hot-deal-card" th:each="hotDealProduct : ${hotDealProducts}">
                <a
                  class="hot-deal-card__eyebrow"
                  th:href="@{/hot-deals(hotDealId=${hotDealProduct.hotDealId})}"
                  th:text="${hotDealProduct.hotDealTitle}"
                >
                  핫딜 제목
                </a>

                <div class="hot-deal-card__body">
                  <a
                    class="hot-deal-card__image hot-deal-card__image-link"
                    th:href="@{/product/{id}(id=${hotDealProduct.productId})}"
                  >
                    <img
                      data-fallback-src="/images/logo-hi-eating.png"
                      th:alt="${hotDealProduct.productName}"
                      th:src="${#strings.isEmpty(hotDealProduct.pictureLocation) ? '/images/logo-hi-eating.png' : hotDealProduct.pictureLocation}"
                    />
                    <span
                      class="hot-deal-card__stock"
                      th:text="|남은수량 ${hotDealProduct.stock}개|"
                    >
                      남은수량 4개
                    </span>
                  </a>

                  <div>
                    <a
                      class="hot-deal-card__name"
                      th:href="@{/product/{id}(id=${hotDealProduct.productId})}"
                      th:text="${hotDealProduct.productName}"
                    >
                      상품명
                    </a>
                    <p
                      class="hot-deal-card__discount"
                      th:text="|${hotDealProduct.discountRate}% 할인|"
                    >
                      20% 할인
                    </p>
                    <p
                      class="hot-deal-card__price"
                      th:text="${#numbers.formatInteger(hotDealProduct.hotDealPrice, 0, 'COMMA')} + '원'"
                    >
                      9,900원
                    </p>
                    <div class="hot-deal-card__meta">
                      <span>종료까지 남은 시간</span>
                      <span
                        class="hot-deal-card__timer"
                        th:attr="data-end-at=${hotDealProduct.endsAt}"
                      >
                        00:00:00
                      </span>
                    </div>
                  </div>
                </div>
              </article>
            </div>
          </div>

          <button
            aria-label="다음 핫딜"
            class="hot-deal-nav hot-deal-nav--next"
            data-carousel-next
            type="button"
          >
            <i aria-hidden="true" class="bi bi-chevron-right"></i>
          </button>
        </section>
      </section>

      <section
        aria-label="지금 가장 많이 담는 상품"
        class="most-purchased-section container-xl reveal-section"
      >
        <h2 class="section-title section-title--center">지금 가장 많이 담는 상품</h2>

        <p class="section-empty" th:if="${#lists.isEmpty(mostPurchasedProducts)}">
          표시할 상품이 없습니다.
        </p>

        <div class="most-purchased-grid" th:if="${!#lists.isEmpty(mostPurchasedProducts)}">
          <article class="product-card" th:each="product, stat : ${mostPurchasedProducts}">
            <div class="product-card__image">
              <a
                class="product-card__image-link"
                th:href="@{/product/{id}(id=${product.productId})}"
              >
                <span class="product-card__rank" th:text="|Top ${stat.index + 1}|">Top 1</span>
                <img
                  data-fallback-src="/images/logo-hi-eating.png"
                  th:alt="${product.productName}"
                  th:src="${#strings.isEmpty(product.pictureLocation) ? '/images/logo-hi-eating.png' : product.pictureLocation}"
                />
              </a>
              <th:block
                th:replace="~{fragments/favorite-button :: button(${product.productId}, ${product.favorite})}"
              ></th:block>
            </div>
            <a
              class="product-card__name product-card__name-link"
              th:href="@{/product/{id}(id=${product.productId})}"
              th:text="${product.productName}"
            >
              상품명
            </a>
            <p class="product-card__price">
              <span
                class="discount-rate"
                th:if="${product.discountRate > 0}"
                th:text="|${product.discountRate}%|"
              >
                20%
              </span>
              <strong
                th:text="${#numbers.formatInteger(product.salePrice != null ? product.salePrice : product.price, 0, 'COMMA')} + '원'"
              >
                3,280원
              </strong>
            </p>
            <del
              th:if="${product.discountRate > 0}"
              th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + '원'"
            >
              4,100원
            </del>
            <p class="product-card__quantity" th:text="|누적 ${product.totalQuantity}개 판매|">
              누적 0개 판매
            </p>
          </article>
        </div>
      </section>
    </div>
  </body>
</html>
