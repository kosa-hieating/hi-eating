<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
  <section th:fragment="content">
    <section class="home-hero">
      <p class="section-eyebrow">오늘의 식탁을 가볍게 고르는 곳</p>
      <h1>Hi Eating에서 맛있는 선택을 시작하세요.</h1>
      <p>카테고리, 핫딜, 즐겨찾기를 한 흐름에서 둘러볼 수 있도록 공통 레이아웃을 준비했습니다.</p>
    </section>

    <section class="content-preview-grid" aria-label="추천 섹션">
      <article class="content-preview">
        <span>Category</span>
        <strong>먹고 싶은 종류부터 빠르게</strong>
      </article>
      <article class="content-preview">
        <span>Hot Deal</span>
        <strong>놓치기 아까운 혜택 모아보기</strong>
      </article>
      <article class="content-preview">
        <span>Favorites</span>
        <strong>자주 찾는 메뉴는 즐겨찾기로</strong>
      </article>
    </section>

    <section class="demo-scroll-space" aria-label="오늘의 큐레이션">
      <h2>오늘의 큐레이션</h2>
      <p>든든한 한 끼부터 가볍게 즐기는 간식까지, 지금 둘러보기 좋은 선택지를 준비하고 있습니다.</p>
    </section>
  </section>
</body>
</html>
