<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hi Eating</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/layout.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/chat-widget.css}" />
    <link
      rel="stylesheet"
      th:if="${pageStylesheet != null}"
      th:href="@{/css/{stylesheet}.css(stylesheet=${pageStylesheet})}"
    />
    <script>
      window.__IMAGE_FALLBACK_SRC__ = '/images/logo-hi-eating.png';

      document.addEventListener(
        'error',
        function (event) {
          const target = event.target;

          if (!(target instanceof HTMLImageElement)) {
            return;
          }

          if (target.dataset.fallbackApplied === 'true') {
            return;
          }

          const fallbackSrc = target.dataset.fallbackSrc || window.__IMAGE_FALLBACK_SRC__;

          target.dataset.fallbackApplied = 'true';
          target.src = fallbackSrc;
        },
        true,
      );
    </script>
  </head>
  <body>
    <header th:replace="~{fragments/header :: siteHeader}"></header>
    <main class="site-main">
      <th:block th:replace="~{${contentTemplate} :: ${contentFragment}}">
        <h1>Hi Eating</h1>
      </th:block>
    </main>
    <footer th:replace="~{fragments/footer :: siteFooter}"></footer>
    <div
      class="chat-widget"
      id="chat-widget-root"
      th:data-authenticated="${currentUser != null}"
      th:data-login-url="@{/login}"
      th:data-room-url="@{/api/chat/room}"
      th:data-ws-url="@{/ws/chat}"
    >
      <button class="chat-widget__launcher" type="button" aria-label="상담 채팅 열기">
        <i class="bi bi-chat-dots-fill" aria-hidden="true"></i>
        <span class="chat-widget__badge" id="chat-widget-badge" hidden>0</span>
      </button>

      <section class="chat-widget__panel" id="chat-widget-panel" aria-label="실시간 상담" hidden>
        <header class="chat-widget__header">
          <div>
            <strong>상담 채팅</strong>
            <span id="chat-widget-status">상담 준비 중</span>
          </div>
          <button class="chat-widget__close" type="button" aria-label="상담 채팅 닫기">
            <i class="bi bi-x-lg" aria-hidden="true"></i>
          </button>
        </header>

        <div class="chat-widget__messages" id="chat-widget-messages" aria-live="polite"></div>

        <form class="chat-widget__form" id="chat-widget-form">
          <textarea
            id="chat-widget-input"
            maxlength="1000"
            rows="1"
            placeholder="메시지를 입력하세요"
            aria-label="상담 메시지"
          ></textarea>
          <button type="submit" aria-label="메시지 보내기">
            <i class="bi bi-send-fill" aria-hidden="true"></i>
          </button>
        </form>
      </section>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      defer
    ></script>
    <script th:src="@{/js/header.js}" defer></script>
    <script th:src="@{/js/favorite.js}" defer></script>
    <script th:src="@{/js/chat-widget.js}" defer></script>
    <script
      th:if="${pageScript != null}"
      th:src="@{/js/{script}.js(script=${pageScript})}"
      defer
    ></script>
  </body>
</html>
