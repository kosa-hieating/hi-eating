<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hi Eating</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:if="${pageStylesheet != null}" th:href="@{/css/{stylesheet}.css(stylesheet=${pageStylesheet})}">
</head>
<body>
  <header th:replace="~{fragments/header :: siteHeader}"></header>
  <main class="site-main">
    <th:block th:replace="~{${contentTemplate} :: ${contentFragment}}">
      <h1>Hi Eating</h1>
    </th:block>
  </main>
  <footer th:replace="~{fragments/footer :: siteFooter}"></footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script th:src="@{/js/header.js}" defer></script>
  <script th:if="${pageScript != null}" th:src="@{/js/{script}.js(script=${pageScript})}" defer></script>
</body>
</html>
