<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>HI.eating | Admin</title>
    <link rel="icon" type="image/png" th:href="@{/images/logo-hi-eating.png}" />
    <link rel="apple-touch-icon" th:href="@{/images/logo-hi-eating.png}" />
    <!-- 부트스트랩 CSS 및 아이콘 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/layout.css}" />
    <link rel="stylesheet" th:href="@{/css/admin-common.css}" />
    <!-- 동적 페이지 스타일시트 -->
    <link
      rel="stylesheet"
      th:href="@{/css/{stylesheet}.css(stylesheet=${pageStylesheet})}"
      th:if="${pageStylesheet != null}"
    />
  </head>
  <body>
    <!-- 사이드바 접기/열기 플로팅 버튼 -->
    <button aria-label="사이드바 접기/펼치기" class="sidebar-toggle-btn" id="sidebarToggleBtn">
      <i class="bi bi-chevron-left"></i>
    </button>

    <th:block th:replace="~{${contentTemplate} :: ${contentFragment}}"> </th:block>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script defer th:if="${pageVendorScript != null}" th:src="${pageVendorScript}"></script>
    <!-- 동적 페이지 스크립트 -->
    <script
      defer
      th:if="${pageScript != null}"
      th:src="@{/js/{script}.js(script=${pageScript})}"
      th:type="${pageScriptType != null ? pageScriptType : 'text/javascript'}"
    ></script>
    <!-- 사이드바 접기/열기 스크립트 -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const toggleBtn = document.getElementById('sidebarToggleBtn');
        if (toggleBtn) {
          // 로컬 스토리지에서 이전 상태 복원
          const isCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
          if (isCollapsed) {
            document.body.classList.add('sidebar-collapsed');
            const icon = toggleBtn.querySelector('i');
            if (icon) {
              icon.className = 'bi bi-chevron-right';
            }
          }

          toggleBtn.addEventListener('click', () => {
            const collapsed = document.body.classList.toggle('sidebar-collapsed');
            localStorage.setItem('sidebar-collapsed', collapsed);

            const icon = toggleBtn.querySelector('i');
            if (icon) {
              icon.className = collapsed ? 'bi bi-chevron-right' : 'bi bi-chevron-left';
            }
          });
        }
      });
    </script>

    <!-- 공통 알림 모달 -->
    <div
      aria-hidden="true"
      aria-labelledby="common-alert-modal-title"
      class="modal fade admin-common-modal"
      id="common-alert-modal"
      tabindex="-1"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title" id="common-alert-modal-title">알림</h2>
            <button
              aria-label="닫기"
              class="btn-close"
              data-bs-dismiss="modal"
              type="button"
            ></button>
          </div>
          <div class="modal-body">
            <p class="admin-common-modal-message" id="common-alert-modal-message">
              메시지 내용
            </p>
          </div>
          <div class="modal-footer">
            <button class="admin-common-modal-button" data-bs-dismiss="modal" type="button">
              확인
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function() {
        const alertModalEl = document.getElementById('common-alert-modal');
        const alertTitleEl = document.getElementById('common-alert-modal-title');
        const alertMessageEl = document.getElementById('common-alert-modal-message');

        if (alertModalEl && alertMessageEl) {
          window.alert = function (message, title = '알림') {
            if (alertTitleEl) {
              alertTitleEl.textContent = title;
            }
            alertMessageEl.innerHTML = String(message).replace(/\n/g, '<br>');
            if (window.bootstrap?.Modal) {
              const modal = window.bootstrap.Modal.getOrCreateInstance(alertModalEl);
              modal.show();
            }
          };
        }
      })();
    </script>
  </body>
</html>
