<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Hi Eating | Admin</title>
    <link rel="stylesheet" th:href="@{/css/layout.css}" />
    <!-- 부트스트랩 CSS 및 아이콘 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <!-- 동적 페이지 스타일시트 -->
    <link
      rel="stylesheet"
      th:href="@{/css/{stylesheet}.css(stylesheet=${pageStylesheet})}"
      th:if="${pageStylesheet != null}"
    />
  </head>
  <body>
    <!-- 사이드바 접기/열기 플로팅 버튼 -->
    <button aria-label="사이드바 접기/펼치기" class="sidebar-toggle-btn" id="sidebarToggleBtn">
      <i class="bi bi-chevron-left"></i>
    </button>

    <th:block th:replace="~{${contentTemplate} :: ${contentFragment}}"> </th:block>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script defer th:if="${pageVendorScript != null}" th:src="${pageVendorScript}"></script>
    <!-- 동적 페이지 스크립트 -->
    <script
      defer
      th:if="${pageScript != null}"
      th:src="@{/js/{script}.js(script=${pageScript})}"
      th:type="${pageScriptType != null ? pageScriptType : 'text/javascript'}"
    ></script>
    <!-- 사이드바 접기/열기 스크립트 -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const toggleBtn = document.getElementById('sidebarToggleBtn');
        if (toggleBtn) {
          // 로컬 스토리지에서 이전 상태 복원
          const isCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
          if (isCollapsed) {
            document.body.classList.add('sidebar-collapsed');
            const icon = toggleBtn.querySelector('i');
            if (icon) {
              icon.className = 'bi bi-chevron-right';
            }
          }

          toggleBtn.addEventListener('click', () => {
            const collapsed = document.body.classList.toggle('sidebar-collapsed');
            localStorage.setItem('sidebar-collapsed', collapsed);

            const icon = toggleBtn.querySelector('i');
            if (icon) {
              icon.className = collapsed ? 'bi bi-chevron-right' : 'bi bi-chevron-left';
            }
          });
        }
      });
    </script>
  </body>
</html>
