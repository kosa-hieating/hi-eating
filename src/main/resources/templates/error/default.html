<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HI.eating | 에러 발생</title>
    <!-- 구글 폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <!-- 부트스트랩 CSS 및 아이콘 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <!-- 커스텀 에러 스타일시트 -->
    <link rel="stylesheet" th:href="@{/css/error.css}" />
  </head>
  <body>
    <div class="error-card">
      <div class="error-icon-box">
        <i class="bi bi-exclamation-triangle-fill"></i>
      </div>

      <h1 class="error-title">오류가 발생했습니다</h1>
      <p class="text-muted mb-4">요청하신 페이지를 처리하는 동안 예외가 발생했습니다.</p>

      <div class="error-message-box">
        <strong class="d-block mb-1 text-secondary" style="font-size: 0.8rem">오류 메시지</strong>
        <span th:text="${errorMessage}">서버 내부 오류가 발생했습니다.</span>
      </div>

      <div class="error-meta">
        <span><strong>경로:</strong> <span th:text="${requestURI}">/admin/hotdeals</span></span>
        <span th:if="${errorCode != null}"
          ><strong>코드:</strong> <span th:text="${errorCode}">COMMON500</span></span
        >
      </div>

      <a href="/" class="btn-home"> <i class="bi bi-house-door-fill me-2"></i> 메인 홈으로 이동 </a>
    </div>
  </body>
</html>
