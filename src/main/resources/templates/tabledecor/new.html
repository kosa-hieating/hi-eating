<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <body>
    <section th:fragment="content" class="table-decor-page">
      <div class="table-decor-shell">
        <header class="table-decor-hero table-decor-hero--builder">
          <div>
            <p class="table-decor-kicker">3D Builder</p>
            <h1>내 식탁 등록하기</h1>
            <p>
              3D 식탁 편집 화면은 다음 단계에서 SAM 3D 상품 모델과 연결할 예정입니다.
            </p>
          </div>
          <a class="table-decor-create-link table-decor-create-link--subtle" th:href="@{/table-decorations}">
            목록으로 돌아가기
          </a>
        </header>

        <div class="table-builder-preview">
          <div class="table-builder-preview__stage">
            <i aria-hidden="true" class="bi bi-badge-3d"></i>
            <strong>3D 식탁 편집 영역</strong>
            <span>상품 모델 선택, 배치, 저장 로직이 이 영역에 연결됩니다.</span>
          </div>
          <aside class="table-builder-preview__panel">
            <h2>상품 목록</h2>
            <p>이후 3D 모델이 등록된 상품만 선택할 수 있도록 연결합니다.</p>
          </aside>
        </div>
      </div>
    </section>
  </body>
</html>
