spring.config.import=optional:file:.env[.properties]
spring.application.name=${SPRING_APPLICATION_NAME:hi-eating}

# Server
server.port=${SERVER_PORT:8080}
server.servlet.session.timeout=${SERVER_SESSION_TIMEOUT:30m}

# Database
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:oracle.jdbc.OracleDriver}
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

# MyBatis
mybatis.mapper-locations=classpath:/mappers/**/*.xml
mybatis.type-aliases-package=kr.or.hieating
mybatis.configuration.map-underscore-to-camel-case=true

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST:/}
greenfood.email-event.enabled=${GREENFOOD_EMAIL_EVENT_ENABLED:true}
greenfood.email-event.exchange=${GREENFOOD_EMAIL_EVENT_EXCHANGE:greenfood.email.exchange}
greenfood.email-event.routing-key=${GREENFOOD_EMAIL_EVENT_ROUTING_KEY:greenfood.email.send.requested}
greenfood.email-event.queue=${GREENFOOD_EMAIL_EVENT_QUEUE:greenfood.email.send.requested.queue}

# Spring AI local LLM
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.options.model=${OLLAMA_CHAT_MODEL:llama3.2:1b}
spring.ai.ollama.chat.options.temperature=${OLLAMA_CHAT_TEMPERATURE:0.7}
greenfood.ai.enabled=${GREENFOOD_AI_ENABLED:true}
