spring.config.import=optional:file:.env[.properties]
spring.application.name=${SPRING_APPLICATION_NAME:hi-eating}

# Server
server.port=${SERVER_PORT:8080}
server.servlet.session.timeout=${SERVER_SESSION_TIMEOUT:30m}

# Database
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:oracle.jdbc.OracleDriver}
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

# MyBatis
mybatis.mapper-locations=classpath:/mappers/**/*.xml
mybatis.type-aliases-package=kr.or.hieating
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.jdbc-type-for-null=NULL

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# Review image server
greenfood.review-image.server-base-url=${REVIEW_IMAGE_SERVER_BASE_URL:http://${REVIEW_IMAGE_SERVER_IP:localhost}:${REVIEW_IMAGE_SERVER_PORT:3000}}
greenfood.review-image.upload-url=${REVIEW_IMAGE_UPLOAD_URL:${greenfood.review-image.server-base-url}/upload}
greenfood.review-image.public-base-url=${REVIEW_IMAGE_PUBLIC_BASE_URL:http://${SERVER_IP:localhost}}
greenfood.review-image.public-path-prefix=${REVIEW_IMAGE_PUBLIC_PATH_PREFIX:/uploads/promotions/uploads/images}
greenfood.review-image.connect-timeout-ms=${REVIEW_IMAGE_CONNECT_TIMEOUT_MS:3000}
greenfood.review-image.read-timeout-ms=${REVIEW_IMAGE_READ_TIMEOUT_MS:10000}

# Promotion image server
greenfood.promotion-image.server-base-url=${PROMOTION_IMAGE_SERVER_BASE_URL:http://${PROMOTION_IMAGE_SERVER_IP:localhost}:${PROMOTION_IMAGE_SERVER_PORT:3000}}
greenfood.promotion-image.upload-url=${PROMOTION_IMAGE_UPLOAD_URL:${greenfood.promotion-image.server-base-url}/upload}
greenfood.promotion-image.public-base-url=${PROMOTION_IMAGE_PUBLIC_BASE_URL:http://${SERVER_IP:localhost}}
greenfood.promotion-image.public-path-prefix=${PROMOTION_IMAGE_PUBLIC_PATH_PREFIX:/uploads/promotions/uploads/images}
greenfood.promotion-image.connect-timeout-ms=${PROMOTION_IMAGE_CONNECT_TIMEOUT_MS:3000}
greenfood.promotion-image.read-timeout-ms=${PROMOTION_IMAGE_READ_TIMEOUT_MS:10000}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST:/}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.template.mandatory=true
greenfood.email-event.enabled=${GREENFOOD_EMAIL_EVENT_ENABLED:true}
greenfood.email-event.exchange=${GREENFOOD_EMAIL_EVENT_EXCHANGE:greenfood.email.exchange}
greenfood.email-event.routing-key=${GREENFOOD_EMAIL_EVENT_ROUTING_KEY:greenfood.email.send.requested}
greenfood.email-event.queue=${GREENFOOD_EMAIL_EVENT_QUEUE:greenfood.email.send.requested.queue}
greenfood.email.hot-deal-base-url=${HOT_DEAL_PUBLIC_BASE_URL:http://${SERVER_IP:localhost}:${SERVER_PORT:8080}}
greenfood.email.image-base-url=${EMAIL_IMAGE_PUBLIC_BASE_URL:http://${SERVER_IP:localhost}}
greenfood.email-event.publish-confirm-timeout=${GREENFOOD_EMAIL_EVENT_PUBLISH_CONFIRM_TIMEOUT:5s}

# MCP server
spring.ai.mcp.server.name=${MCP_SERVER_NAME:hi-eating}
spring.ai.mcp.server.version=${MCP_SERVER_VERSION:0.0.1}
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.protocol=${MCP_SERVER_PROTOCOL:STREAMABLE}
spring.ai.mcp.server.annotation-scanner.enabled=true

# Spring AI local LLM
greenfood.ai.enabled=${GREENFOOD_AI_ENABLED:true}
greenfood.ai.generation.base-url=${OLLAMA_GENERATION_BASE_URL:http://localhost:11434}
greenfood.ai.generation.model=${OLLAMA_GENERATION_MODEL:kosa-ollama3:latest}
greenfood.ai.generation.temperature=${OLLAMA_GENERATION_TEMPERATURE:0.7}
greenfood.ai.generation.connect-timeout=${OLLAMA_GENERATION_CONNECT_TIMEOUT:3s}
greenfood.ai.generation.read-timeout=${OLLAMA_GENERATION_READ_TIMEOUT:120s}
greenfood.ai.validation.base-url=${OLLAMA_VALIDATION_BASE_URL:http://localhost:11435}
greenfood.ai.validation.model=${OLLAMA_VALIDATION_MODEL:kosa-ollama3:latest}
greenfood.ai.validation.temperature=${OLLAMA_VALIDATION_TEMPERATURE:0.2}
greenfood.ai.validation.connect-timeout=${OLLAMA_VALIDATION_CONNECT_TIMEOUT:3s}

greenfood.ai.validation.read-timeout=${OLLAMA_VALIDATION_READ_TIMEOUT:120s}
greenfood.ai.target-selection.score-threshold=${AI_TARGET_SCORE_THRESHOLD:80}
greenfood.ai.target-selection.batch-size=${AI_TARGET_BATCH_SIZE:1}
greenfood.ai.target-selection.recent-months=${AI_TARGET_RECENT_MONTHS:6}
greenfood.ai.target-selection.retry-count=${AI_TARGET_RETRY_COUNT:1}
greenfood.ai.target-selection.job-max-retries=${AI_TARGET_JOB_MAX_RETRIES:3}
greenfood.ai.target-selection.job-poll-delay=${AI_TARGET_JOB_POLL_DELAY:5s}

# Spring AI recommendation model (embedding)
greenfood.ai.recommendation.base-url=${OLLAMA_RECOMMENDATION_BASE_URL:http://localhost:11436}
greenfood.ai.recommendation.model=${OLLAMA_RECOMMENDATION_MODEL:nomic-embed-text:latest}
greenfood.ai.recommendation.temperature=${OLLAMA_RECOMMENDATION_TEMPERATURE:0.7}
greenfood.ai.recommendation.connect-timeout=${OLLAMA_RECOMMENDATION_CONNECT_TIMEOUT:3s}
greenfood.ai.recommendation.read-timeout=${OLLAMA_RECOMMENDATION_READ_TIMEOUT:120s}
