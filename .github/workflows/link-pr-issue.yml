name: Link PR Issue

on:
  pull_request_target:
    types: [opened, edited, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  link-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Add closing issue reference
        uses: actions/github-script@v7
        with:
          script: |
            const pullRequest = context.payload.pull_request;
            const title = pullRequest.title;
            const issueMatch = title.match(/\(#(\d+)\)/);

            if (!issueMatch) {
              core.info('PR title does not contain an issue number like "(#12)".');
              return;
            }

            const issueNumber = issueMatch[1];
            const closingReference = `Closes #${issueNumber}`;
            const autoLinkStart = '<!-- auto-close-issue: start -->';
            const autoLinkEnd = '<!-- auto-close-issue: end -->';
            const autoLinkedReference = `${autoLinkStart}\n${closingReference}\n${autoLinkEnd}`;
            const autoLinkPattern = new RegExp(
              `${autoLinkStart}[\\s\\S]*?${autoLinkEnd}`,
            );
            const body = pullRequest.body || '';
            const existingReferencePattern = new RegExp(
              `\\b(close[sd]?|fix(e[sd])?|resolve[sd]?)\\s+#${issueNumber}\\b`,
              'i',
            );

            if (autoLinkPattern.test(body)) {
              const bodyWithoutAutoLink = body.replace(autoLinkPattern, '').trimEnd();
              const nextBody = existingReferencePattern.test(bodyWithoutAutoLink)
                ? bodyWithoutAutoLink
                : body.replace(autoLinkPattern, autoLinkedReference);

              if (nextBody === body) {
                core.info(`PR body already has the current auto-linked issue #${issueNumber}.`);
                return;
              }

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullRequest.number,
                body: nextBody,
              });

              core.info(`Replaced the auto-linked issue reference with "${closingReference}".`);
              return;
            }

            if (existingReferencePattern.test(body)) {
              core.info(`PR body already references #${issueNumber} with a closing keyword.`);
              return;
            }

            const relatedIssueHeadingPattern = /^##[ \t]*관련 이슈[ \t]*$/m;
            const trimmedBody = body.trimEnd();
            const nextBody = relatedIssueHeadingPattern.test(trimmedBody)
              ? trimmedBody.replace(
                  relatedIssueHeadingPattern,
                  (heading) => `${heading}\n\n${autoLinkedReference}`,
                )
              : `${trimmedBody}${trimmedBody ? '\n\n' : ''}## 관련 이슈\n\n${autoLinkedReference}`;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullRequest.number,
              body: nextBody,
            });

            core.info(`Added "${closingReference}" to the PR body.`);
